name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra torch

      - name: Run fast tests
        run: uv run pytest tests/ -v -m "not slow"

      - name: Lint (ruff)
        run: uv run ruff check pu_toolbox/

      - name: Test quality gate
        run: uv run python scripts/check_test_quality.py

      - name: Doc consistency check
        run: uv run python scripts/check_doc_links.py
